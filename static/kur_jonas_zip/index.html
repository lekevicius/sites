<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where's Jonas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --text: 106, 47, 43;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      font-size: 0.875rem;
    }

    a {
      text-decoration: none;
    }

    html {
      background: linear-gradient(180deg, #fbf8f8 0%, #f9f3f3 100%) no-repeat bottom;
      background-size: 100% 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    body {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    article {
      max-width: 26rem;
      min-width: 20rem;
      width: 100%;
      color: rgb(var(--text));
    }

    h1 {
      font-size: 1.5rem;
      font-style: normal;
      font-weight: 700;
      line-height: 2rem;
      letter-spacing: -0.03rem;
    }

    header p {
      font-size: 1rem;
      font-style: normal;
      font-weight: 400;
      line-height: 1.5rem;
      letter-spacing: -0.0175rem;
      margin-top: 0.5rem;
    }

    .hide {
      display: none;
    }

    section {
      display: flex;
      flex-direction: column;
      margin-top: 1rem;

      border-radius: 0.75rem;
      border: 1px solid rgba(var(--text), 0.12);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0px 4px 6px -2px rgba(var(--text), 0.05), 0px 8px 15px -3px rgba(var(--text), 0.08);
      overflow: hidden;
    }

    section div.primary-item {
      display: flex;
      align-items: start;
      padding: 1rem;
      gap: 1rem;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    section div.primary-item p {
      font-size: 0.875rem;
      line-height: 1.25rem;
    }

    section div.primary-item p strong {
      font-size: 1rem;
      line-height: 1.5rem;
    }

    span.muted {
      color: rgba(var(--text), 0.4)
    }

    section div.dual-item,
    section div.single-item {
      display: flex;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    section div.single-item a {
      display: flex;
      align-items: center;
      padding: 1rem 0.25rem 1rem 1rem;
      width: 100%;
    }

    section div.dual-item a {
      display: flex;
      align-items: center;
      padding: 1rem 0.25rem 1rem 1rem;
      width: 50%;
      border-right: 1px solid rgba(var(--text), 0.12);
    }

    section div.dual-item a:last-child {
      border-right: none;
    }

    section div.text-item {
      padding: 1rem;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    a.icon-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      color: inherit;
    }

    section div:last-child {
      border-bottom: none;
    }

    .text-item a.icon-link {
      margin-top: 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background: rgba(var(--text), 0.8);
      color: #fff;
      font-size: 0.875rem;
      line-height: 1.25rem;
      animation: fadeOut 2s ease-in-out;
    }

    @keyframes fadeOut {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    .tabs {
      height: 3rem;
      display: flex;
      gap: 1rem;
      padding: 0 0 0 1rem;
      align-items: stretch;
      font-size: 0.875rem;
    }

    .tabs strong {
      display: flex;
      align-items: center;
    }

    .tabs a {
      color: inherit;
      display: flex;
      align-items: center;
      margin: 4px 0;
    }

    .tabs a.selected {
      margin-bottom: 0;
      border-bottom: 4px solid #CF8642;
    }

    .video-tab {
      overflow: hidden;
    }

    .video-tab .thumbnail {
      position: relative;
      cursor: pointer;
    }

    .video-tab .thumbnail img {
      width: 100%;
      height: auto;
      display: block;
    }

    .video-tab .thumbnail .play {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      font-weight: bold;
      padding: 0.5rem 1rem;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff;
      font-size: 1rem;
      line-height: 1.25rem;
    }

    .video-tab video {
      width: 100%;
      height: auto;
      display: none;
    }

    .video-tab.show-video .thumbnail {
      display: none;
    }

    .video-tab.show-video video {
      display: block;
    }

    .guide-image {
      background-image: url('./scheme-photo.jpg');
      width: 100%;
      /* aspect ratio: 492:180 */
      padding-bottom: 36.59%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    .guide-image img {
      position: absolute;
      height: auto;
      opacity: 0;
    }

    .guide-image img.street {
      width: 31.3%;
      left: 9.75%;
      top: 22.2%;
      animation: 0.4s ease-out 1.6s 1 forwards scale-from-right;
    }

    .guide-image img.door {
      width: 3.25%;
      left: 85%;
      top: 45.5%;
      animation: 0.4s ease-out 2.6s 1 forwards fade;
    }

    .guide-image img.number {
      width: 8.53%;
      left: 89%;
      top: 31.1%;
      animation: 0.4s ease-out 3s 1 forwards scale-from-bottom-left;
    }

    .guide-image img.doorbell {
      width: 30.5%;
      left: 54.9%;
      top: 22.2%;
      animation: 0.4s ease-out 4.2s 1 forwards scale-from-right;
    }

    .guide-image img.name {
      width: 22%;
      left: 47.5%;
      top: 61.6%;
      animation: 0.4s ease-out 4.6s 1 forwards scale-from-top;
    }

    @keyframes fade {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      80% {
        opacity: 1;
        transform: scale(1.3);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes scale-from-right {
      0% {
        opacity: 0;
        transform: translateX(2rem) scale(0.5);
      }

      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes scale-from-bottom-left {
      0% {
        opacity: 0;
        transform: translateX(-1rem) translateY(1rem) scale(0.5);
      }

      100% {
        opacity: 1;
        transform: translateX(0) translateY(0) scale(1);
      }
    }

    @keyframes scale-from-top {
      0% {
        opacity: 0;
        transform: translateY(-1rem) scale(0.5);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>
  <article>
    <header>
      <h1>Where does Jonas live?</h1>
      <p id="amount" class="hide">
        It seems you owe Jonas <strong>9 Euros</strong>.
      </p>
    </header>
    <section>
      <div class="primary-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" fill="none" viewBox="0 0 40 48">
          <path fill="url(#a)" fill-rule="evenodd"

            clip-rule="evenodd" />
          <defs>

              <stop stop-color="#A64732" />
              <stop offset="1" stop-color="#CF8642" />
            </linearGradient>
          </defs>
        </svg>
        <div>
          <p><strong>Lydos g. 4-64</strong></p>
          <p>Vilnius 01133, Lithuania</p>
        </div>
      </div>
      <div class="dual-item">
        <a class="icon-link" href="#" id="copy-address">

          </svg>

        </a>
        <a class="icon-link" href="#" id="copy-coordinates">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path fill="currentColor"
              d="M14 10.333v3c0 .367-.3.667-.667.667h-6a.664.664 0 0 1-.666-.667v-6a.66.66 0 0 1 .666-.666h6c.367 0 .667.293.667.666v3Zm1.333 0v-3c0-1.106-.9-2-2-2h-6c-1.106 0-2 .894-2 2v6c0 1.1.894 2 2 2h6c1.1 0 2-.9 2-2v-3Z" />
            <path fill="currentColor"
              d="M3.333 9.333h-.666A.664.664 0 0 1 2 8.667v-6A.66.66 0 0 1 2.667 2h6c.366 0 .666.293.666.667v.666c0 .367.294.667.667.667.367 0 .667-.3.667-.667v-.666c0-1.107-.9-2-2-2h-6c-1.107 0-2 .893-2 2v6c0 1.1.893 2 2 2h.666c.367 0 .667-.3.667-.667 0-.373-.3-.667-.667-.667Z" />
          </svg>
          <span>Copy Coordinates</span>
        </a>
      </div>
      <div class="dual-item">
        <a class="icon-link" href="https://maps.app.goo.gl/vtMVm7TVQzdT6gTu5">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path fill="currentColor"
              d="m13.333 3.6-6.2 6.2-.006-.007c-.26.26-.68.26-.94 0a.652.652 0 0 1 0-.94l6.186-6.186H10A.664.664 0 0 1 9.333 2 .66.66 0 0 1 10 1.333h3.86a.667.667 0 0 1 .687.285c.075.107.12.239.12.382v4c0 .367-.3.667-.667.667A.664.664 0 0 1 13.333 6V3.6Z" />
            <path fill="currentColor"
              d="M11.333 8.667v4c0 .366-.3.666-.666.666H3.333a.664.664 0 0 1-.666-.666V5.333a.66.66 0 0 1 .666-.666h4C7.7 4.667 8 4.367 8 4c0-.373-.3-.667-.667-.667h-4c-1.106 0-2 .894-2 2v7.334c0 1.1.894 2 2 2h7.334c1.1 0 2-.9 2-2v-4c0-.374-.3-.667-.667-.667a.66.66 0 0 0-.667.667Z" />
          </svg>
          <span>Google Maps</span>
        </a>
        <a class="icon-link"
          href="https://maps.apple.com/?daddr=Lydos%20g.%204,%20Lydos%20g.%204,%20LT-01133%20Vilnius,%20Lithuania&dirflg=w">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path fill="currentColor"
              d="m13.333 3.6-6.2 6.2-.006-.007c-.26.26-.68.26-.94 0a.652.652 0 0 1 0-.94l6.186-6.186H10A.664.664 0 0 1 9.333 2 .66.66 0 0 1 10 1.333h3.86a.667.667 0 0 1 .687.285c.075.107.12.239.12.382v4c0 .367-.3.667-.667.667A.664.664 0 0 1 13.333 6V3.6Z" />
            <path fill="currentColor"
              d="M11.333 8.667v4c0 .366-.3.666-.666.666H3.333a.664.664 0 0 1-.666-.666V5.333a.66.66 0 0 1 .666-.666h4C7.7 4.667 8 4.367 8 4c0-.373-.3-.667-.667-.667h-4c-1.106 0-2 .894-2 2v7.334c0 1.1.894 2 2 2h7.334c1.1 0 2-.9 2-2v-4c0-.374-.3-.667-.667-.667a.66.66 0 0 0-.667.667Z" />
          </svg>
          <span>Apple Maps</span>
        </a>
      </div>
      <div class="guide-image">
        <img src="scheme-street.png" class="street" />
        <img src="scheme-door.png" class="door" />
        <img src="scheme-number.png" class="number" />
        <img src="scheme-doorbell.png" class="doorbell" />
        <img src="scheme-name.png" class="name" />
      </div>
      <div class="single-item">
        <a class="icon-link" href="https://maps.app.goo.gl/ZX8GaDDn7RB6qpr48">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path
              d="M8 5.333A2.67 2.67 0 0 1 10.667 8c0 1.467-1.2 2.667-2.667 2.667a2.666 2.666 0 1 1 0-5.333Zm0 4a1.333 1.333 0 1 0 0-2.667 1.333 1.333 0 0 0 0 2.667Z"
              fill="currentColor" />
            <path
              d="M.066 8.287a.626.626 0 0 1 0-.594l-.04-.046c.093-.187.267-.5.527-.894a13.36 13.36 0 0 1 1.506-1.926C3.74 3.04 5.713 1.953 7.966 1.953s4.227 1.087 5.907 2.88c.58.62 1.08 1.274 1.506 1.934.254.393.427.706.527.9a.678.678 0 0 1 0 .6c-.093.186-.267.5-.52.9-.427.66-.927 1.313-1.5 1.933-1.68 1.787-3.653 2.88-5.9 2.88-2.253 0-4.227-1.087-5.9-2.873-.58-.62-1.08-1.274-1.5-1.927a10.02 10.02 0 0 1-.52-.893Zm1.344-.28a12.555 12.555 0 0 0 1.617 2.153c1.446 1.547 3.1 2.46 4.933 2.46 1.827 0 3.48-.913 4.933-2.453.52-.547.974-1.147 1.36-1.734.11-.17.206-.33.293-.475a9.56 9.56 0 0 0-.28-.458 12.565 12.565 0 0 0-1.352-1.733c-1.447-1.547-3.1-2.454-4.927-2.454-1.827 0-3.48.914-4.927 2.46a11.662 11.662 0 0 0-1.65 2.234Z"
              fill="currentColor" />
          </svg>
          <span>Look at my door in Google Street View</span>
        </a>
      </div>
    </section>
    <section>
      <div class="tabs">
        <strong>Guide</strong>
        <a href="#" id="show-mo-museum" class="selected">From Mo Museum</a>
        <a href="#" id="show-town-hall">From Town Hall</a>
      </div>
      <div class="video-tab" id="mo-museum">
        <div class="thumbnail" id="play-mo-museum">
          <img src="mo.jpg" />
          <div class="play">
            <svg width="12" height="16" viewBox="0 0 12 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M10.5 7.13387C11.1667 7.51877 11.1667 8.48102 10.5 8.86592L1.5 14.0621C0.833333 14.447 -3.3649e-08 13.9658 0 13.196L4.54262e-07 2.80374C4.87911e-07 2.03394 0.833334 1.55281 1.5 1.93771L10.5 7.13387Z"
                fill="currentColor" />
            </svg>
            <span>0:20</span>
          </div>
        </div>
        <video class="video" autoplay muted loop playsinline>
          <source src="mo.mp4" type="video/mp4">
        </video>
      </div>
      <div class="video-tab hide" id="town-hall">
        <div class="thumbnail" id="play-townhall">
          <img src="townhall.jpg" />
          <div class="play">
            <svg width="12" height="16" viewBox="0 0 12 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M10.5 7.13387C11.1667 7.51877 11.1667 8.48102 10.5 8.86592L1.5 14.0621C0.833333 14.447 -3.3649e-08 13.9658 0 13.196L4.54262e-07 2.80374C4.87911e-07 2.03394 0.833334 1.55281 1.5 1.93771L10.5 7.13387Z"
                fill="currentColor" />
            </svg>
            <span>0:27</span>
          </div>
        </div>
        <video autoplay muted loop playsinline>
          <source src="townhall.mp4" type="video/mp4">
        </video>
    </section>
  </article>
  <script>
    const copyAddress = document.querySelector('#copy-address');
    const copyCoordinates = document.querySelector('#copy-coordinates');

    copyAddress.addEventListener('click', (e) => {
      e.preventDefault();
      copyToClipboard('Lydos g. 4-64, Vilnius 01133, Lithuania');
      showToast('Copied!');
    });

    copyCoordinates.addEventListener('click', (e) => {
      e.preventDefault();
      copyToClipboard('54.678569922601376, 25.28043534264815');
      showToast('Copied!');
    });

    function copyToClipboard(text) {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    }

    function showToast(text) {
      const toast = document.createElement('div');
      toast.classList.add('toast');
      toast.innerHTML = text;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    // Tabs
    const tabs = document.querySelectorAll('.tabs a');
    const moMuseum = document.querySelector('#mo-museum');
    const townHall = document.querySelector('#town-hall');
    const playMoMuseum = document.querySelector('#play-mo-museum');
    const playTownHall = document.querySelector('#play-townhall');
    const videoMoMuseum = document.querySelector('#mo-museum video');
    const videoTownHall = document.querySelector('#town-hall video');

    // switch tabs
    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        e.preventDefault();
        tabs.forEach(tab => {
          tab.classList.remove('selected');
        });
        tab.classList.add('selected');
        if (tab.id === 'show-mo-museum') {
          moMuseum.classList.remove('hide');
          townHall.classList.add('hide');
          townHall.classList.remove('show-video');
          videoMoMuseum.play();
          videoTownHall.pause();
          videoTownHall.currentTime = 0;
        } else {
          moMuseum.classList.add('hide');
          moMuseum.classList.remove('show-video');
          townHall.classList.remove('hide');
          videoMoMuseum.pause();
          videoMoMuseum.currentTime = 0;
          videoTownHall.play();
        }
      });
    });

    // play videos
    playMoMuseum.addEventListener('click', (e) => {
      e.preventDefault();
      moMuseum.classList.add('show-video');
      videoMoMuseum.currentTime = 0;
      videoMoMuseum.play();
    });
    playTownHall.addEventListener('click', (e) => {
      e.preventDefault();
      townHall.classList.add('show-video');
      videoTownHall.currentTime = 0;
      videoTownHall.play();
    });
  </script>
</body>

</html>
