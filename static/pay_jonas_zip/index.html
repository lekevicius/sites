<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Jonas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --text: 111, 72, 51;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      font-size: 0.875rem;
    }

    a {
      text-decoration: none;
    }

    html {
      background: linear-gradient(180deg, #fbfaf8 0%, #f9f7f3 100%) no-repeat bottom;
      background-size: 100% 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    body {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    article {
      max-width: 26rem;
      min-width: 20rem;
      width: 100%;
      color: rgb(var(--text));
    }

    h1 {
      font-size: 1.5rem;
      font-style: normal;
      font-weight: 700;
      line-height: 2rem;
      letter-spacing: -0.03rem;
    }

    header p {
      font-size: 1rem;
      font-style: normal;
      font-weight: 400;
      line-height: 1.5rem;
      letter-spacing: -0.0175rem;
      margin-top: 0.5rem;
    }

    .hide {
      display: none;
    }

    section {
      display: flex;
      flex-direction: column;
      margin-top: 1rem;

      border-radius: 0.75rem;
      border: 1px solid rgba(var(--text), 0.12);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0px 4px 6px -2px rgba(var(--text), 0.05), 0px 8px 15px -3px rgba(var(--text), 0.08);
    }

    section div.primary-item {
      display: flex;
      align-items: start;
      padding: 1rem;
      gap: 1rem;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    section div.primary-item p {
      font-size: 0.875rem;
      line-height: 1.25rem;
    }

    section div.primary-item p strong {
      font-size: 1rem;
      line-height: 1.5rem;
    }

    span.muted {
      color: rgba(var(--text), 0.4)
    }

    section div.dual-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    section div.dual-item a {
      display: flex;
      align-items: center;
      padding: 1rem 0.25rem 1rem 1rem;
      width: 50%;
      border-right: 1px solid rgba(var(--text), 0.12);
    }

    section div.dual-item a:last-child {
      border-right: none;
    }

    section div.text-item {
      padding: 1rem;
      border-bottom: 1px solid rgba(var(--text), 0.12);
    }

    a.icon-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      color: inherit;
    }

    section div:last-child {
      border-bottom: none;
    }

    .text-item a.icon-link {
      margin-top: 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      background: rgba(var(--text), 0.8);
      color: #fff;
      font-size: 0.875rem;
      line-height: 1.25rem;
      animation: fadeOut 2s ease-in-out;
    }

    @keyframes fadeOut {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }
  </style>
</head>

  <script>
    const copyAccount = document.querySelector('#copy-account');
    const copyName = document.querySelector('#copy-name');
    // const copyCrypto = document.querySelector('#copy-crypto');

    copyAccount.addEventListener('click', (e) => {
      e.preventDefault();
      copyToClipboard('LT807300010110577064');
      showToast('Copied!');
    });

    copyName.addEventListener('click', (e) => {
      e.preventDefault();
      copyToClipboard('Jonas Lekevičius');
      showToast('Copied!');
    });

    // copyCrypto.addEventListener('click', (e) => {
    //   e.preventDefault();
    //   copyToClipboard('0x3bf0282b0199D486c4ABC76298c0F3dbDfA77455');
    //   showToast('Copied!');
    // });

    function copyToClipboard(text) {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    }

    function showToast(text) {
      const toast = document.createElement('div');
      toast.classList.add('toast');
      toast.innerHTML = text;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    // check if there is a query param
    // ?9 means 9 euros
    // set #amount text to the amount and remove .hide class
    const urlParams = new URLSearchParams(window.location.search);
    const allEntries = urlParams.entries();
    const allEntriesArr = Array.from(allEntries);
    if (allEntriesArr[0] && allEntriesArr[0][0]) {
      const amount = allEntriesArr[0][0];
      const amountEl = document.querySelector('#amount');
      amountEl.innerHTML = `It seems you owe Jonas <strong>${amount} Euros</strong>.`;
      amountEl.classList.remove('hide');
    }
  </script>
